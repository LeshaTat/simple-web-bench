<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workbench</title>
<script src="/vendor/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1a1b26;
    --surface:  #24283b;
    --border:   #414868;
    --border2:  #565f89;
    --text:     #c0caf5;
    --muted:    #565f89;
    --accent:   #7aa2f7;
    --green:    #9ece6a;
    --red:      #f7768e;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  nav { display: flex; gap: 2px; }

  nav a {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.03em;
    transition: color 0.15s, background 0.15s;
    text-decoration: none;
  }

  nav a:hover { color: var(--text); background: var(--border); }
  nav a.active { color: var(--accent); background: rgba(122,162,247,0.15); }

  #ws-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  #ws-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  #ws-dot.ok { background: var(--green); }

  .page { display: none; flex: 1; overflow-y: auto; padding: 28px 24px; }
  .page.active { display: block; }

  /* ── Script cards ── */
  #scripts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 16px;
    align-items: start;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--border2);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.running {
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(158,206,106,0.5);
    animation: pulse 1.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(158,206,106,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(158,206,106,0);   }
    100% { box-shadow: 0 0 0 0   rgba(158,206,106,0);   }
  }

  .card-label {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
    letter-spacing: 0.02em;
  }

  .card-meta {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: #1f2335;
  }

  .btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, opacity 0.15s;
  }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .btn-run {
    background: transparent;
    border-color: var(--green);
    color: var(--green);
  }
  .btn-run:hover:not(:disabled) { background: rgba(158,206,106,0.15); }

  .btn-stop {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }
  .btn-stop:hover:not(:disabled) { background: rgba(247,118,142,0.15); }

  .log-panel {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    color: #a9b1d6;
    padding: 12px 14px;
    height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    background: #16161e;
  }
  .log-panel:empty::before {
    content: 'no log';
    color: var(--border2);
  }

  /* scrollbar */
  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: transparent; }
  .log-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Dashboard ── */
  #dashboard-content {
    max-width: 860px;
    line-height: 1.75;
  }
  #dashboard-content h1,
  #dashboard-content h2,
  #dashboard-content h3 {
    font-family: var(--mono);
    color: var(--accent);
    margin: 32px 0 12px;
    letter-spacing: 0.04em;
  }
  #dashboard-content h1 { font-size: 24px; }
  #dashboard-content h2 { font-size: 18px; }
  #dashboard-content h3 { font-size: 15px; }
  #dashboard-content p { color: #a9b1d6; margin-bottom: 12px; }
  #dashboard-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(122,162,247,0.3);
    transition: border-color 0.15s;
  }
  #dashboard-content a:hover { border-color: var(--accent); }
  #dashboard-content ul, #dashboard-content ol {
    padding-left: 20px;
    color: #a9b1d6;
    margin-bottom: 12px;
  }
  #dashboard-content li { margin-bottom: 6px; }
  #dashboard-content code {
    font-family: var(--mono);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    color: #c0caf5;
  }
  #dashboard-content pre {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 3px;
    overflow-x: auto;
    margin-bottom: 14px;
  }
  #dashboard-content pre code {
    background: none;
    border: none;
    padding: 0;
  }
  #dashboard-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">⬡ Workbench</span>
    <nav>
      <a href="/" data-page="dashboard">Dashboard</a>
      <a href="/scripts" data-page="scripts">Scripts</a>
    </nav>
    <div id="ws-indicator">
      <div id="ws-dot"></div>
      <span id="ws-label">connecting</span>
    </div>
  </header>

  <div id="page-dashboard" class="page">
    <div id="dashboard-content"></div>
  </div>

  <div id="page-scripts" class="page">
    <div id="scripts-grid"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const scripts = {};   // name -> { ...config, running, lastRun }
let ws;

// ── Nav ───────────────────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector(`nav a[data-page="${page}"]`).classList.add('active');
  document.getElementById('page-' + page).classList.add('active');
}

document.querySelectorAll('nav a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const page = link.dataset.page;
    history.pushState(null, '', link.href);
    showPage(page);
  });
});

window.addEventListener('popstate', () => {
  const page = location.pathname === '/scripts' ? 'scripts' : 'dashboard';
  showPage(page);
});

// Initial page based on URL
const initialPage = location.pathname === '/scripts' ? 'scripts' : 'dashboard';
showPage(initialPage);

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    setWS(true);
  };

  ws.onclose = () => {
    setWS(false);
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'log') appendLog(msg.script, msg.data);
    if (msg.type === 'status') updateStatus(msg.script, msg.running, msg.lastRun);
  };
}

function setWS(ok) {
  document.getElementById('ws-dot').className = ok ? 'ok' : '';
  document.getElementById('ws-label').textContent = ok ? 'live' : 'reconnecting…';
}

// ── Scripts ───────────────────────────────────────────────────────────────────
function toId(name) {
  return name.replace(/[^a-zA-Z0-9]/g, '-');
}

async function loadScripts() {
  const data = await fetch('/api/scripts').then(r => r.json());
  const grid = document.getElementById('scripts-grid');
  grid.innerHTML = '';

  for (const s of data) {
    scripts[s.name] = s;
    grid.appendChild(buildCard(s));
    loadLog(s.name);
  }
}

function buildCard(s) {
  const id = toId(s.name);
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + id;
  card.innerHTML = `
    <div class="card-header">
      <div class="status-dot ${s.running ? 'running' : ''}" id="dot-${id}"></div>
      <div class="card-label">${s.label || s.name}</div>
      <div class="card-meta" id="meta-${id}">${formatLastRun(s.lastRun)}</div>
    </div>
    <div class="card-actions">
      <button class="btn btn-run" id="run-${id}" ${s.running ? 'disabled' : ''}>▶ Run</button>
      <button class="btn btn-stop" id="stop-${id}" ${!s.running ? 'disabled' : ''}>■ Stop</button>
    </div>
    <div class="log-panel" id="log-${id}"></div>
  `;
  card.querySelector('#run-' + id).addEventListener('click', () => runScript(s.name));
  card.querySelector('#stop-' + id).addEventListener('click', () => stopScript(s.name));
  return card;
}

async function loadLog(name) {
  const { content } = await fetch(`/api/scripts/${encodeURIComponent(name)}/log?tail=200`).then(r => r.json());
  const el = document.getElementById('log-' + toId(name));
  if (el && content) {
    el.textContent = content;
    el.scrollTop = el.scrollHeight;
  }
}

function appendLog(name, text) {
  const el = document.getElementById('log-' + toId(name));
  if (!el) return;
  el.textContent += text;
  el.scrollTop = el.scrollHeight;
}

function updateStatus(name, running, lastRun) {
  const id = toId(name);
  const dot  = document.getElementById('dot-' + id);
  const meta = document.getElementById('meta-' + id);
  const run  = document.getElementById('run-' + id);
  const stop = document.getElementById('stop-' + id);
  const log  = document.getElementById('log-' + id);
  if (!dot) return;
  dot.className = 'status-dot' + (running ? ' running' : '');
  meta.textContent = formatLastRun(lastRun);
  run.disabled = running;
  stop.disabled = !running;
  if (running && log) log.textContent = '';
}

async function runScript(name) {
  await fetch(`/api/scripts/${encodeURIComponent(name)}/run`, { method: 'POST' });
}

async function stopScript(name) {
  await fetch(`/api/scripts/${encodeURIComponent(name)}/stop`, { method: 'POST' });
}

function formatLastRun(iso) {
  if (!iso) return 'never run';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
       + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function loadDashboard() {
  const { content } = await fetch('/api/dashboard').then(r => r.json());
  const el = document.getElementById('dashboard-content');
  el.innerHTML = marked.parse(content);
  el.querySelectorAll('a').forEach(a => {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noreferrer');
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
connectWS();
loadScripts();
loadDashboard();
</script>
</body>
</html>
